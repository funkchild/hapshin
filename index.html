<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>합신 교학과 안내 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
  @font-face{font-family:'GmarketSans';font-weight:300;src:url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket/GmarketSansLight.woff2') format('woff2');}
  @font-face{font-family:'GmarketSans';font-weight:500;src:url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket/GmarketSansMedium.woff2') format('woff2');}
  @font-face{font-family:'GmarketSans';font-weight:700;src:url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket/GmarketSansBold.woff2') format('woff2');}
  :root {
    --navy:#1a2744;--navy-light:#243459;--gold:#b8963e;--gold-light:#d4ab5a;
    --cream:#f8f5ef;--gray-light:#f0ede7;--gray-mid:#d6d0c5;
    --text-dark:#1a1a1a;--text-light:#8a8a8a;--white:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  header{background:var(--navy);color:var(--white);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:2px solid var(--gold);}
  .logo{width:42px;height:42px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .logo img{width:42px;height:42px;object-fit:contain;}
  .htitle h1{font-family:'GmarketSans','Noto Sans KR',sans-serif;font-weight:700;font-size:15px;letter-spacing:.01em;color:var(--white);}
  .htitle p{font-family:'GmarketSans','Noto Sans KR',sans-serif;font-size:10.5px;color:var(--gold-light);margin-top:2px;letter-spacing:.03em;font-weight:300;}
  .badge{margin-left:auto;background:rgba(184,150,62,.2);border:1px solid var(--gold);color:var(--gold-light);font-size:10px;padding:3px 8px;border-radius:20px;letter-spacing:.05em;white-space:nowrap;}
  #chat{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
  #chat::-webkit-scrollbar{width:4px;}
  #chat::-webkit-scrollbar-thumb{background:var(--gray-mid);border-radius:2px;}
  .msg{display:flex;gap:10px;animation:fi .25s ease;}
  .msg.user{flex-direction:row-reverse;}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .av{flex-shrink:0;margin-top:2px;}
  .av.bot{width:184px;height:184px;background:transparent;overflow:visible;display:flex;align-items:center;justify-content:center;}
  .av.bot img{width:184px;height:184px;object-fit:contain;}
  .av.user{display:none;}
  .bub{max-width:80%;padding:11px 14px;border-radius:12px;font-size:13.5px;line-height:1.75;color:var(--text-dark);}
  .msg.bot .bub{background:var(--white);border:1px solid var(--gray-mid);border-top-left-radius:3px;}
  .msg.user .bub{background:var(--navy);color:var(--white);border-top-right-radius:3px;}
  .bub b{color:var(--navy);font-weight:600;}
  .msg.user .bub b{color:var(--gold-light);}
  .bub ul{margin:5px 0 4px 18px;}.bub li{margin:3px 0;}
  .bub .sec{margin-top:8px;}
  .tag{display:inline-block;background:var(--gray-light);color:var(--navy);font-size:11px;padding:2px 7px;border-radius:10px;margin:2px 2px 2px 0;font-weight:500;}
  .call{display:inline-block;margin-top:8px;background:var(--navy);color:var(--white);font-size:12px;padding:4px 10px;border-radius:6px;}
  .qw{padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:7px;flex-shrink:0;}
  .qb{background:var(--white);border:1px solid var(--gray-mid);color:var(--navy);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .qb:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}
  .ia{background:var(--white);border-top:1px solid var(--gray-mid);padding:12px 16px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
  #inp{flex:1;border:1.5px solid var(--gray-mid);border-radius:10px;padding:10px 14px;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;line-height:1.5;max-height:100px;color:var(--text-dark);background:var(--cream);transition:border-color .15s;}
  #inp:focus{border-color:var(--navy);background:var(--white);}
  #inp::placeholder{color:var(--text-light);}
  #sbtn{width:40px;height:40px;background:var(--navy);border:none;border-radius:10px;color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
  #sbtn:hover{background:var(--navy-light);}
</style>
</head>

function find(q){
  const s=q.toLowerCase().replace(/\s/g,'');
  let best=null,score=0;
  for(const item of KB){
    let n=0;
    for(const k of item.k) if(s.includes(k.replace(/\s/g,'').toLowerCase())) n++;
    if(n>score){score=n;best=item;}
  }
  if(score>0) return best.a;

function send(){
